<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💰 BINANCE TASKS · Telegram Mini App</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-compat.js"></script>
  
  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- Canvas Confetti for celebrations -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ===== RESET & VARIABLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      /* Light Theme */
      --bg-gradient: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      --bg-primary: #f3f4f6;
      --bg-card: rgba(255, 255, 255, 0.95);
      --bg-card-solid: #ffffff;
      --text-primary: #1f2937;
      --text-secondary: #4b5563;
      --text-muted: #9ca3af;
      --accent: #f59e0b;
      --accent-light: #fef3c7;
      --accent-gradient: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --border: rgba(0, 0, 0, 0.05);
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      --blur: blur(20px);
    }

    /* Dark Theme */
    .dark-mode {
      --bg-gradient: linear-gradient(135deg, #92400e 0%, #991b1b 100%);
      --bg-primary: #111827;
      --bg-card: rgba(31, 41, 55, 0.95);
      --bg-card-solid: #1f2937;
      --text-primary: #f9fafb;
      --text-secondary: #e5e7eb;
      --text-muted: #9ca3af;
      --border: rgba(255, 255, 255, 0.05);
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: 90px;
      transition: background-color 0.3s, color 0.3s;
      position: relative;
    }

    /* Animated Background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-gradient);
      opacity: 0.1;
      z-index: -1;
      animation: gradientShift 10s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.15; }
    }

    /* ===== TOAST NOTIFICATION ===== */
    #toast {
      position: fixed;
      top: 20px;
      left: 16px;
      right: 16px;
      z-index: 10000;
      background: var(--bg-card-solid);
      backdrop-filter: var(--blur);
      color: var(--text-primary);
      padding: 16px 24px;
      border-radius: 100px;
      box-shadow: var(--shadow-xl);
      text-align: center;
      transform: translateY(-150%);
      transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      max-width: 400px;
      margin: 0 auto;
      border: 1px solid var(--border);
      font-weight: 600;
    }

    #toast.show {
      transform: translateY(0);
    }

    #toast.success { background: linear-gradient(135deg, #10b981, #059669); color: white; }
    #toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    #toast.info { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
    #toast.warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }

    /* ===== TAB CONTENT ===== */
    .tab-content {
      display: none;
      padding: 20px 16px;
      animation: fadeIn 0.4s ease;
    }

    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== BOTTOM TAB BAR ===== */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      display: flex;
      justify-content: space-around;
      padding: 12px 8px 20px;
      border-top: 1px solid var(--border);
      z-index: 1000;
      box-shadow: var(--shadow-lg);
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 500;
      padding: 8px 0;
      border-radius: 30px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      gap: 4px;
      cursor: pointer;
    }

    .tab-btn i {
      font-size: 1.5rem;
      margin-bottom: 2px;
      transition: transform 0.3s;
    }

    .tab-btn.active {
      background: var(--accent-gradient);
      color: white;
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .tab-btn.active i {
      transform: scale(1.1);
    }

    .tab-btn:active {
      transform: scale(0.95);
    }

    /* ===== GLASS CARD ===== */
    .glass-card {
      background: var(--bg-card);
      backdrop-filter: var(--blur);
      border-radius: 32px;
      padding: 24px 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
      animation: cardFloat 5s ease infinite;
    }

    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-xl);
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* ===== PROFILE HEADER ===== */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .avatar-container {
      position: relative;
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
      box-shadow: var(--shadow-lg);
      animation: avatarPulse 3s ease infinite;
    }

    @keyframes avatarPulse {
      0%, 100% { border-color: var(--accent); }
      50% { border-color: var(--success); }
    }

    .online-badge {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 15px;
      height: 15px;
      background: var(--success);
      border-radius: 50%;
      border: 2px solid white;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    /* ===== STATS GRID ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 20px 0;
    }

    .stat-item {
      background: var(--accent-light);
      padding: 20px 12px;
      border-radius: 24px;
      text-align: center;
      transition: all 0.3s;
      animation: statPop 0.5s ease;
    }

    .stat-item:nth-child(1) { animation-delay: 0.1s; }
    .stat-item:nth-child(2) { animation-delay: 0.2s; }
    .stat-item:nth-child(3) { animation-delay: 0.3s; }
    .stat-item:nth-child(4) { animation-delay: 0.4s; }

    @keyframes statPop {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ===== ANNOUNCEMENT BANNER ===== */
    .announcement-banner {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #1f2937;
      padding: 16px 20px;
      border-radius: 30px;
      margin-bottom: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideInRight 0.5s ease;
      box-shadow: var(--shadow-lg);
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .announcement-icon {
      font-size: 1.5rem;
      animation: bellShake 2s ease infinite;
    }

    @keyframes bellShake {
      0%, 100% { transform: rotate(0); }
      25% { transform: rotate(15deg); }
      75% { transform: rotate(-15deg); }
    }

    /* ===== TASK CARD ===== */
    .task-card {
      background: var(--bg-card-solid);
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      transition: all 0.3s;
      animation: taskSlide 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .task-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--accent-gradient);
      transform: translateX(-100%);
      transition: transform 0.3s;
    }

    .task-card:hover::before {
      transform: translateX(0);
    }

    @keyframes taskSlide {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .task-name {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .task-type {
      background: var(--accent-light);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
    }

    .task-reward {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 12px 0;
    }

    .task-reward i {
      font-size: 1rem;
    }

    .task-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:active::before {
      width: 300px;
      height: 300px;
    }

    .btn-primary {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 10px 20px -5px var(--accent);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px var(--accent);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
    }

    .btn-outline:hover {
      background: var(--accent);
      color: white;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== REFERRAL BOX ===== */
    .referral-box {
      background: var(--bg-card-solid);
      border-radius: 50px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
      border: 2px dashed var(--accent);
      animation: glowPulse 3s ease infinite;
    }

    @keyframes glowPulse {
      0%, 100% { border-color: var(--accent); }
      50% { border-color: var(--success); }
    }

    .referral-link {
      font-size: 0.85rem;
      color: var(--text-secondary);
      word-break: break-all;
    }

    /* ===== SEARCH BAR ===== */
    .search-box {
      background: var(--bg-card-solid);
      border-radius: 50px;
      padding: 16px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border);
    }

    .search-box i {
      color: var(--text-muted);
    }

    .search-box input {
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 1rem;
      width: 100%;
      outline: none;
    }

    /* ===== CATEGORY CHIPS ===== */
    .category-chips {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 16px 0;
      margin-bottom: 16px;
      scrollbar-width: none;
    }

    .category-chips::-webkit-scrollbar {
      display: none;
    }

    .chip {
      padding: 10px 20px;
      background: var(--bg-card-solid);
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      white-space: nowrap;
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .chip.active {
      background: var(--accent-gradient);
      color: white;
      border: none;
    }

    .chip:active {
      transform: scale(0.95);
    }

    /* ===== WITHDRAWAL CARD ===== */
    .withdrawal-item {
      background: var(--bg-card-solid);
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
      transition: all 0.3s;
    }

    .status-badge {
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-pending { background: #fef3c7; color: #92400e; }
    .status-approved { background: #d1fae5; color: #065f46; }
    .status-rejected { background: #fee2e2; color: #991b1b; }

    /* ===== LOADING SKELETON ===== */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-solid) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 30px;
      height: 100px;
      margin: 10px 0;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ===== ACHIEVEMENT BADGES ===== */
    .badge-container {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .achievement-badge {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      position: relative;
      transition: all 0.3s;
    }

    .achievement-badge.locked {
      opacity: 0.3;
      filter: grayscale(1);
    }

    .achievement-badge::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card-solid);
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .achievement-badge:hover::after {
      opacity: 1;
    }

    /* ===== DAILY STREAK ===== */
    .streak-bar {
      background: var(--bg-card-solid);
      border-radius: 30px;
      padding: 16px;
      margin: 20px 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .streak-flame {
      font-size: 2rem;
      animation: flame 1s ease infinite;
    }

    @keyframes flame {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); color: #f59e0b; }
    }

    /* ===== INPUT STYLES ===== */
    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .input-field {
      width: 100%;
      padding: 18px 24px;
      background: var(--bg-card-solid);
      border: 2px solid var(--border);
      border-radius: 50px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.3s;
    }

    .input-field:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 4px var(--accent-light);
    }

    /* ===== FEE CALCULATOR ===== */
    .fee-calculator {
      background: var(--accent-light);
      border-radius: 24px;
      padding: 16px;
      margin: 20px 0;
    }

    .fee-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dashed var(--border);
    }

    .fee-row.total {
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--success);
      border-bottom: none;
    }

    /* ===== DIVIDERS ===== */
    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 24px 0;
    }

    /* ===== EMPTY STATES ===== */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* ===== PROCESSING TIME BADGE ===== */
    .processing-badge {
      background: var(--accent-light);
      padding: 12px;
      border-radius: 20px;
      font-size: 0.9rem;
      text-align: center;
      margin: 16px 0;
    }

    .processing-badge i {
      color: var(--accent);
      margin-right: 8px;
    }

    /* Responsive */
    @media (max-width: 380px) {
      .stat-value { font-size: 1.5rem; }
      .btn { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <!-- Toast Notification -->
  <div id="toast"></div>

  <!-- Tab Content -->
  <div id="tab-dashboard" class="tab-content active"></div>
  <div id="tab-tasks" class="tab-content"></div>
  <div id="tab-withdrawal" class="tab-content"></div>
  <div id="tab-profile" class="tab-content"></div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="dashboard">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </button>
    <button class="tab-btn" data-tab="tasks">
      <i class="fas fa-tasks"></i>
      <span>Tasks</span>
    </button>
    <button class="tab-btn" data-tab="withdrawal">
      <i class="fas fa-wallet"></i>
      <span>Withdraw</span>
    </button>
    <button class="tab-btn" data-tab="profile">
      <i class="fas fa-user"></i>
      <span>Profile</span>
    </button>
  </div>

  <script>
    // ===== FIREBASE CONFIG (YOUR CONFIGURATION) =====
    const firebaseConfig = {
      apiKey: "AIzaSyAjBxfY94Ye4fGO6uNN-Y73PwvDHa-aR3I",
      authDomain: "tg-task-bot-d8a74.firebaseapp.com",
      projectId: "tg-task-bot-d8a74",
      storageBucket: "tg-task-bot-d8a74.firebasestorage.app",
      messagingSenderId: "72738148295",
      appId: "1:72738148295:web:06b9bc5c8509b93f4bd3e2"
    };

    // ===== BOT CONFIGURATION =====
    const BOT_USERNAME = "G_task_bot";
    const CHANNEL_LINK = "https://t.me/G_task_bot";
    const COMMUNITY_LINK = "https://t.me/g_tasks_chat";
    const APP_URL = "https://karmaethio-beep.github.io/Tg-task-bot";

    // ===== WITHDRAWAL CONFIGURATION =====
    const MIN_WITHDRAWAL = 0.20; // $0.20 minimum
    const WITHDRAWAL_FEE = 0.10; // $0.10 flat fee

    // ===== GLOBAL STATE =====
    let app, db;
    let tg = window.Telegram?.WebApp;
    let tgUser = null;
    let currentUserId = null;
    let userData = null;
    let userDocRef = null;
    let allTasks = [];
    let announcements = [];
    let claimedTasks = new Set(); // Track claimed task IDs
    let currentFilter = 'all';
    let searchQuery = '';
    let unsubscribeUser = null;
    let unsubscribeTasks = null;
    let unsubscribeAnnouncements = null;
    let unsubscribeWithdrawals = null;

    // ===== THEME TOGGLE =====
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    // Initialize theme
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
    }

    // ===== TOAST FUNCTION =====
    function showToast(message, type = 'info', duration = 3000) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show ' + type;
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, duration);

      // Haptic feedback for Telegram
      if (tg && tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('medium');
      }
    }

    // ===== CONFETTI CELEBRATION =====
    function celebrate() {
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 },

    // ===== CREATE OR FETCH USER =====
    async function createOrFetchUser() {
      if (!tgUser) return null;
      
      const uid = tgUser.id.toString();
      currentUserId = uid;
      const startParam = tg?.initDataUnsafe?.start_param;

      userDocRef = db.collection('users').doc(uid);
      
      try {
        const docSnap = await userDocRef.get();

        if (!docSnap.exists) {
          // Create new user
          let refferBy = null;
          if (startParam && startParam !== uid) {
            refferBy = startParam;
            showToast(`🎁 Referred by: ${refferBy}`, 'success');
          }

          const newUser = {
            id: uid,
            name: tgUser.first_name || 'User',
            photoURL: tgUser.photo_url || 'https://via.placeholder.com/100',
            coins: 0,
            reffer: 0,
            refferBy: refferBy,
            tasksCompleted: 0,
            totalWithdrawals: 0,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
            streak: 0,
            lastClaimDate: null,
            level: 1,
            achievements: []
          };

          await userDocRef.set(newUser);
          userData = newUser;
          showToast('🎉 Welcome to Binance Tasks!', 'success');
          celebrate();
        } else {
          userData = docSnap.data();
          
          // Update last seen
          await userDocRef.update({
            lastSeen: firebase.firestore.FieldValue.serverTimestamp()
          });

          // Check daily streak
          checkDailyStreak();
        }

        // Listen to user changes
        if (unsubscribeUser) unsubscribeUser();
        unsubscribeUser = userDocRef.onSnapshot(snap => {
          if (snap.exists) {
            userData = snap.data();
            // Update UI if current tab is dashboard or profile
            if (document.getElementById('tab-dashboard').classList.contains('active')) {
              renderDashboard();
            } else if (document.getElementById('tab-profile').classList.contains('active')) {
              renderProfile();
            }
          }
        });

        return userData;
      } catch (error) {
        console.error('Error in createOrFetchUser:', error);
        showToast('Error loading user data', 'error');
        return null;
      }
    }

    // ===== CHECK DAILY STREAK =====
    async function checkDailyStreak() {
      if (!userData || !userDocRef) return;

      const today = new Date().toDateString();
      const lastClaim = userData.lastClaimDate ? new Date(userData.lastClaimDate).toDateString() : null;

      if (lastClaim !== today) {
        // Check if yesterday was claimed
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toDateString();

        if (lastClaim === yesterdayStr) {
          // Increase streak
          const newStreak = (userData.streak || 0) + 1;
          await userDocRef.update({
            streak: newStreak,
            lastClaimDate: firebase.firestore.FieldValue.serverTimestamp()
          });

          // Streak bonus
          const bonus = Math.min(newStreak * 0.5, 10); // $0.50 per day, max $10
          await userDocRef.update({
            coins: firebase.firestore.FieldValue.increment(bonus)
          });

          showToast(`🔥 ${newStreak} day streak! +$${bonus.toFixed(2)} bonus!`, 'success');
          celebrate();
        } else {
          // Reset streak
          await userDocRef.update({
            streak: 1,
            lastClaimDate: firebase.firestore.FieldValue.serverTimestamp()
          });
        }
      }
    }

    // ===== CLAIM TASK =====
    async function claimTask(taskId, reward, button) {
      if (!currentUserId) {
        showToast('Please login first', 'error');
        return;
      }

      button.disabled = true;
      const originalText = button.innerHTML;
      button.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

      const claimRef = db.collection('user_claims').doc(`${currentUserId}_${taskId}`);
      const taskRef = db.collection('tasks').doc(taskId);
      const userRef = db.collection('users').doc(currentUserId);

      try {
        await db.runTransaction(async (transaction) => {
          // Check if already claimed
          const claimDoc = await transaction.get(claimRef);
          if (claimDoc.exists) {
            throw new Error('already_claimed');
          }

          // Check if task exists
          const taskDoc = await transaction.get(taskRef);
          if (!taskDoc.exists) {
            throw new Error('task_not_found');
          }

          // Create claim record
          transaction.set(claimRef, {
            userId: currentUserId,
            taskId: taskId,
            claimedAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          // Update user
          transaction.update(userRef, {
            coins: firebase.firestore.FieldValue.increment(reward),
            tasksCompleted: firebase.firestore.FieldValue.increment(1)
          });
        });

        // Add to claimed tasks set
        claimedTasks.add(taskId);
        
        showToast(`✅ Claimed $${reward.toFixed(2)}!`, 'success');
        celebrate();
        
        // Remove the task card from UI
        const taskCard = button.closest('.task-card');
        if (taskCard) {
          taskCard.style.animation = 'fadeOut 0.3s ease';
          setTimeout(() => {
            taskCard.remove();
          }, 300);
        }

      } catch (error) {
        if (error.message === 'already_claimed') {
          showToast('⏳ Already claimed this task', 'warning');
          // Add to claimed set and hide
          claimedTasks.add(taskId);
          const taskCard = button.closest('.task-card');
          if (taskCard) {
            taskCard.style.animation = 'fadeOut 0.3s ease';
            setTimeout(() => {
              taskCard.remove();
            }, 300);
          }
        } else {
          console.error('Claim error:', error);
          showToast('Error claiming task', 'error');
        }
        button.disabled = false;
        button.innerHTML = originalText;
      }
    }

    // ===== FILTER TASKS =====
    function filterTasks(filter) {
      currentFilter = filter;
      
      // Update active chip
      document.querySelectorAll('.chip').forEach(chip => {
        chip.classList.remove('active');
      });
      if (event && event.target) {
        event.target.classList.add('active');
      }

      let filtered = allTasks;

      // Apply type filter
      if (filter !== 'all') {
        filtered = filtered.filter(t => t.type === filter);
      }

      // Filter out claimed tasks
      filtered = filtered.filter(t => !claimedTasks.has(t.id));

      // Apply search filter
      if (searchQuery) {
        const query = searchQuery.toLowerCase();
        filtered = filtered.filter(t => 
          t.name?.toLowerCase().includes(query) || 
          t.type?.toLowerCase().includes(query)
        );
      }

      const tasksList = document.getElementById('tasksList');
      if (!tasksList) return;

      if (filtered.length === 0) {
        tasksList.innerHTML = `

      amount = parseFloat(amount) || 0;

      const receive = Math.max(0, amount - fee);
      return {
        amount: amount,
        fee: fee,
        receive: receive
      };
    }

      const binanceId = document.getElementById('binanceInput').value.trim();

      const calculation = calculateReceiveAmount(amount);

      // Validation
      if (!binanceId) {

      if (!amount || amount < MIN_WITHDRAWAL) {

      if (amount > (userData?.coins || 0)) {
        showToast('Insufficient balance', 'error');
        return;
      }

      // Binance ID validation (simple check)
      if (!binanceId.includes('@') && isNaN(binanceId)) {
        showToast('Enter valid Binance ID (email or UID)', 'error');
        return;
      }

      try {
        // Create withdrawal request
        await db.collection('withdrawals').add({
          userId: currentUserId,
          binanceId: binanceId,
          amount: amount,
          fee: WITHDRAWAL_FEE,
          receiveAmount: calculation.receive,
          status: 'pending',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        showToast('✅ Withdrawal requested successfully!', 'success');
        
        // Clear inputs
        document.getElementById('binanceInput').value = '';
        document.getElementById('amountInput').value = '';
        updateFeeDisplay();

        if (tg && tg.HapticFeedback) {
          tg.HapticFeedback.notificationOccurred('success');
        }

      } catch (error) {
        console.error('Withdrawal error:', error);
        showToast('Error requesting withdrawal', 'error');
      }
    }

    // ===== RENDER PROFILE =====
    function renderProfile() {
      if (!userData) return;

      const el = document.getElementById('tab-profile');
      
      // Calculate level based on coins
      const level = Math.floor((userData.coins || 0) / 100) + 1;
      const nextLevel = (level * 100) - (userData.coins || 0);
      
      // Achievements
      const achievements = [
        { icon: 'fa-tasks', name: 'First Task', unlocked: (userData.tasksCompleted || 0) >= 1 },
        { icon: 'fa-rocket', name: '10 Tasks', unlocked: (userData.tasksCompleted || 0) >= 10 },
        { icon: 'fa-crown', name: '50 Tasks', unlocked: (userData.tasksCompleted || 0) >= 50 },
        { icon: 'fa-users', name: 'First Referral', unlocked: (userData.reffer || 0) >= 1 },
        { icon: 'fa-star', name: '5 Referrals', unlocked: (userData.reffer || 0) >= 5 },
        { icon: 'fa-dragon', name: '10 Referrals', unlocked: (userData.reffer || 0) >= 10 }
      ];

      let html = `
        <div class="glass-card" style="text-align: center;">
          <div class="avatar-container" style="margin: 0 auto 20px; width: fit-content;">
            <img class="avatar" style="width: 100px; height: 100px;" src="${userData.photoURL}" alt="avatar" onerror="this.src='https://via.placeholder.com/100'">
            <div class="online-badge" style="bottom: 10px; right: 10px;"></div>
          </div>
          
          <h2>${userData.name}</h2>
          <p style="color: var(--text-secondary); margin: 8px 0;">ID: ${userData.id}</p>
          
          <div style="background: var(--accent-light); padding: 16px; border-radius: 30px; margin: 20px 0;">
            <p><i class="fas fa-user-plus"></i> Referred by: <strong>${userData.refferBy || 'None'}</strong></p>
          </div>

          <div class="divider"></div>

          <div style="text-align: left;">
            <div style="margin: 20px 0;">
              <h4>Level ${level}</h4>
              <div style="background: var(--border); height: 10px; border-radius: 10px; overflow: hidden;">
                <div style="background: var(--accent-gradient); width: ${((userData.coins || 0) % 100)}%; height: 100%;"></div>
              </div>
              <p style="font-size: 0.9rem; color: var(--text-secondary);">$${nextLevel.toFixed(2)} to next level</p>
            </div>

            <div class="stats-grid" style="grid-template-columns: 1fr 1fr;">
              <div class="stat-item">
                <i class="fas fa-dollar-sign"></i>
                <div class="stat-value">$${(userData.coins || 0).toFixed(2)}</div>
                <div class="stat-label">Balance</div>
              </div>
              <div class="stat-item">
                <i class="fas fa-users"></i>
                <div class="stat-value">${userData.reffer || 0}</div>
                <div class="stat-label">Referrals</div>
              </div>
            </div>
          </div>

          <div class="divider"></div>

          <h4 style="margin: 20px 0;"><i class="fas fa-medal"></i> Achievements</h4>
          <div class="badge-container">
            ${achievements.map(ach => `
              <div class="achievement-badge ${ach.unlocked ? '' : 'locked'}" data-tooltip="${ach.name}">
                <i class="fas ${ach.icon}"></i>
              </div>
            `).join('')}
          </div>

          <div style="display: flex; gap: 10px; margin-top: 30px;">
            <button class="btn btn-outline" onclick="renderProfile()" style="flex: 1;">
              <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <button class="btn btn-outline" onclick="copyReferralLink()" style="flex: 1;">
              <i class="fas fa-copy"></i> Copy Link
            </button>
          </div>
        </div>
      `;

      el.innerHTML = html;
    }

    // ===== COPY REFERRAL LINK =====
    function copyReferralLink() {
      if (!userData) return;
      
      const link = `https://t.me/${BOT_USERNAME}?start=${userData.id}`;
      navigator.clipboard.writeText(link);
      showToast('📋 Referral link copied!', 'success');
      
      if (tg && tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('light');
      }
    }

    // ===== SWITCH TABS =====
    function switchTabs(tabId) {
      // Update tab buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');

      // Update content
      document.querySelectorAll('.tab-content').forEach(el => {
        el.classList.remove('active');
      });
      document.getElementById(`tab-${tabId}`).classList.add('active');

      // Render appropriate content
      switch(tabId) {
        case 'dashboard':
          renderDashboard();
          break;
        case 'tasks':
          renderAllTasks();
          break;
        case 'withdrawal':
          renderWithdrawal();
          break;
        case 'profile':
          renderProfile();
          break;
      }

      // Haptic feedback
      if (tg && tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('light');
      }
    }

    // ===== INITIALIZATION =====
    window.addEventListener('load', async () => {
      initTelegram();
      
      if (!initFirebase()) {
        showToast('Please configure Firebase', 'error');
        return;
      }

      await createOrFetchUser();

      // Listen to announcements
      if (unsubscribeAnnouncements) unsubscribeAnnouncements();
      
      unsubscribeAnnouncements = db.collection('announcements')
        .orderBy('createdAt', 'desc')
        .limit(5)
        .onSnapshot(snap => {
          announcements = [];
          snap.forEach(doc => announcements.push(doc.data()));
          if (document.getElementById('tab-dashboard').classList.contains('active')) {
            renderDashboard();
          }
        });

      // Tab click listeners
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const tab = e.currentTarget.dataset.tab;
          switchTabs(tab);
        });
      });

      // Start with dashboard
      switchTabs('dashboard');
    });

    // Cleanup on unload
    window.addEventListener('beforeunload', () => {
      if (unsubscribeUser) unsubscribeUser();
      if (unsubscribeTasks) unsubscribeTasks();
      if (unsubscribeAnnouncements) unsubscribeAnnouncements();
      if (unsubscribeWithdrawals) unsubscribeWithdrawals();
    });

    // Add fadeOut animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes fadeOut {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(0.8); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
