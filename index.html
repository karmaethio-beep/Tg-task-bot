<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💰 TASK PANEL · Earn Money</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-compat.js"></script>
  
  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Monetag Ad SDK -->
  <script src='//libtl.com/sdk.js' data-zone='10730906' data-sdk='show_10730906'></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    :root {
      --primary: #8B5CF6;
      --primary-dark: #7C3AED;
      --secondary: #EC4899;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --dark: #1F2937;
      --light: #F9FAFB;
      --gray: #9CA3AF;
      --border: #E5E7EB;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding-bottom: 80px;
      position: relative;
    }

    /* Toast */
    #toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-150%);
      background: var(--dark);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 500;
      z-index: 10000;
      transition: transform 0.3s;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 90%;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #toast.success { background: var(--success); }
    #toast.error { background: var(--danger); }
    #toast.warning { background: var(--warning); }

    /* Tab Bar */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 12px 8px 20px;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
      z-index: 1000;
      border-radius: 30px 30px 0 0;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent;
      border: none;
      color: var(--gray);
      font-size: 0.7rem;
      font-weight: 500;
      padding: 8px 0;
      border-radius: 30px;
      transition: all 0.3s;
      gap: 4px;
      cursor: pointer;
    }

    .tab-btn i {
      font-size: 1.5rem;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
    }

    /* Tab Content */
    .tab-content {
      display: none;
      padding: 20px 16px;
    }

    .tab-content.active {
      display: block;
    }

    /* Cards */
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* Profile Header */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid var(--primary);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 15px 0;
    }

    .stat-card {
      background: linear-gradient(135deg, #f3f4f6, #ffffff);
      padding: 15px;
      border-radius: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      color: var(--gray);
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* Announcement Banner */
    .announcement {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 15px 20px;
      border-radius: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.9; }
    }

    /* Task Card */
    .task-card {
      background: white;
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .task-name {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .task-type {
      background: #f3f4f6;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--primary);
    }

    .task-reward {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--success);
      margin: 10px 0;
    }

    .task-actions {
      display: flex;
      gap: 10px;
    }

    /* Buttons */
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }

    .btn-sm {
      padding: 8px 16px;
      font-size: 0.9rem;
    }

    /* Forms */
    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      color: var(--dark);
      font-weight: 500;
    }

    .input-field {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid var(--border);
      border-radius: 30px;
      font-size: 1rem;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Referral Box */
    .referral-box {
      background: #f3f4f6;
      border-radius: 50px;
      padding: 12px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 2px dashed var(--primary);
    }

    .referral-link {
      font-size: 0.85rem;
      color: var(--gray);
      word-break: break-all;
    }

    /* Search */
    .search-box {
      background: white;
      border-radius: 50px;
      padding: 12px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 1rem;
    }

    .search-box input:focus {
      outline: none;
    }

    /* Withdrawal Item */
    .withdrawal-item {
      background: white;
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .status-pending { background: #FEF3C7; color: #92400E; }
    .status-approved { background: #D1FAE5; color: #065F46; }
    .status-rejected { background: #FEE2E2; color: #991B1B; }

    /* Loading */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 30px;
      height: 80px;
      margin: 10px 0;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <!-- Toast -->
  <div id="toast"></div>

  <!-- Tab Contents -->
  <div id="tab-dashboard" class="tab-content active"></div>
  <div id="tab-tasks" class="tab-content"></div>
  <div id="tab-withdraw" class="tab-content"></div>
  <div id="tab-profile" class="tab-content"></div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="dashboard">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </button>
    <button class="tab-btn" data-tab="tasks">
      <i class="fas fa-tasks"></i>
      <span>Tasks</span>
    </button>
    <button class="tab-btn" data-tab="withdraw">
      <i class="fas fa-wallet"></i>
      <span>Withdraw</span>
    </button>
    <button class="tab-btn" data-tab="profile">
      <i class="fas fa-user"></i>
      <span>Profile</span>
    </button>
  </div>

  <script>
    // ===== FIREBASE CONFIG (YOUR CONFIGURATION) =====
    const firebaseConfig = {
      apiKey: "AIzaSyAjBxfY94Ye4fGO6uNN-Y73PwvDHa-aR3I",
      authDomain: "tg-task-bot-d8a74.firebaseapp.com",
      projectId: "tg-task-bot-d8a74",
      storageBucket: "tg-task-bot-d8a74.firebasestorage.app",
      messagingSenderId: "72738148295",
      appId: "1:72738148295:web:06b9bc5c8509b93f4bd3e2"
    };

    // ===== BOT CONFIGURATION =====
    const BOT_USERNAME = "G_task_bot";
    const CHANNEL_LINK = "https://t.me/G_task_bot";
    const COMMUNITY_LINK = "https://t.me/g_tasks_chat";
    const APP_URL = "https://karmaethio-beep.github.io/Tg-task-bot";

    // ===== GLOBAL STATE =====
    let app, db;
    let tg = window.Telegram?.WebApp;
    let tgUser = null;
    let currentUserId = null;
    let userData = null;
    let userDocRef = null;
    let allTasks = [];
    let claimedTasks = new Set();
    let unsubscribeUser = null;
    let unsubscribeTasks = null;

    // ===== TOAST =====
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show ' + type;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ===== INIT TELEGRAM =====
    function initTelegram() {
      if (tg) {
        tg.expand();
        tg.ready();
        tgUser = tg.initDataUnsafe?.user;
        
        if (!tgUser) {
          // Fallback for testing
          tgUser = { 
            id: 123456789, 
            first_name: 'Test User', 
            photo_url: 'https://via.placeholder.com/100' 
          };
        }
      } else {
        // Fallback for browser testing
        tgUser = { 
          id: 999999, 
          first_name: 'Browser User', 
          photo_url: 'https://via.placeholder.com/100' 
        };
      }
    }

    // ===== INIT FIREBASE =====
    function initFirebase() {
      try {
        app = firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        return true;
      } catch (error) {
        console.error('Firebase init error:', error);
        showToast('Firebase configuration error', 'error');
        return false;
      }
    }

    // ===== CREATE OR FETCH USER =====
    async function createOrFetchUser() {
      if (!tgUser) return null;
      
      const uid = tgUser.id.toString();
      currentUserId = uid;
      const startParam = tg?.initDataUnsafe?.start_param;

      userDocRef = db.collection('users').doc(uid);
      
      try {
        const docSnap = await userDocRef.get();

        if (!docSnap.exists) {
          // Create new user
          let refferBy = null;
          if (startParam && startParam !== uid) {
            refferBy = startParam;
          }

          const newUser = {
            id: uid,
            name: tgUser.first_name || 'User',
            photoURL: tgUser.photo_url || 'https://via.placeholder.com/100',
            coins: 0,
            reffer: 0,
            refferBy: refferBy,
            tasksCompleted: 0,
            totalWithdrawals: 0,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          };

          await userDocRef.set(newUser);
          userData = newUser;
        } else {
          userData = docSnap.data();
        }

        // Listen to user changes
        if (unsubscribeUser) unsubscribeUser();
        unsubscribeUser = userDocRef.onSnapshot(snap => {
          if (snap.exists) {
            userData = snap.data();
            refreshCurrentTab();
          }
        });

        return userData;
      } catch (error) {
        console.error('Error:', error);
        showToast('Error loading user data', 'error');
        return null;
      }
    }

    // ===== LOAD CLAIMED TASKS =====
    async function loadClaimedTasks() {
      if (!currentUserId) return;
      
      try {
        const claimsSnapshot = await db.collection('user_claims')
          .where('userId', '==', currentUserId)
          .get();
        
        claimedTasks.clear();
        claimsSnapshot.forEach(doc => {
          const taskId = doc.id.replace(`${currentUserId}_`, '');
          claimedTasks.add(taskId);
        });
      } catch (error) {
        console.error('Error loading claims:', error);
      }
    }

    // ===== REFRESH CURRENT TAB =====
    function refreshCurrentTab() {
      const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab;
      if (activeTab === 'dashboard') renderDashboard();
      else if (activeTab === 'tasks') renderTasks();
      else if (activeTab === 'withdraw') renderWithdraw();
      else if (activeTab === 'profile') renderProfile();
    }

    // ===== RENDER DASHBOARD =====
    async function renderDashboard() {
      const el = document.getElementById('tab-dashboard');
      
      if (!userData) {
        el.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
        return;
      }

      // Get latest announcement
      const announcSnapshot = await db.collection('announcements')
        .orderBy('createdAt', 'desc')
        .limit(1)
        .get();
      
      const latestAnnouncement = !announcSnapshot.empty ? announcSnapshot.docs[0].data() : null;

      // Get quick tasks (top 3)
      await loadClaimedTasks();
      const tasksSnapshot = await db.collection('tasks')
        .orderBy('createdAt', 'desc')
        .limit(10)
        .get();
      
      const quickTasks = [];
      tasksSnapshot.forEach(doc => {
        const task = { id: doc.id, ...doc.data() };
        if (!claimedTasks.has(doc.id)) {
          quickTasks.push(task);
        }
      });

      let html = `
        <div class="glass-card">
          <div class="profile-header">
            <img class="avatar" src="${userData.photoURL}" alt="avatar">
            <div>
              <h2>${userData.name}</h2>
              <p style="color: var(--gray);">ID: ${userData.id}</p>
            </div>
          </div>
        </div>
      `;

      // Announcement Banner
      if (latestAnnouncement) {
        html += `
          <div class="announcement">
            <i class="fas fa-bullhorn"></i>
            <div>
              <strong>${latestAnnouncement.title}</strong>
              <p style="font-size: 0.9rem;">${latestAnnouncement.body || ''}</p>
            </div>
          </div>
        `;
      }

      // Statistics Cards
      html += `
        <div class="stats-grid">
          <div class="stat-card">
            <i class="fas fa-rupee-sign" style="color: var(--success);"></i>
            <div class="stat-value">₹${(userData.coins || 0).toFixed(2)}</div>
            <div class="stat-label">Balance</div>
          </div>
          <div class="stat-card">
            <i class="fas fa-users" style="color: var(--primary);"></i>
            <div class="stat-value">${userData.reffer || 0}</div>
            <div class="stat-label">Referrals</div>
          </div>
          <div class="stat-card">
            <i class="fas fa-history" style="color: var(--warning);"></i>
            <div class="stat-value">₹${(userData.totalWithdrawals || 0).toFixed(2)}</div>
            <div class="stat-label">Withdrawn</div>
          </div>
          <div class="stat-card">
            <i class="fas fa-check-circle" style="color: var(--success);"></i>
            <div class="stat-value">${userData.tasksCompleted || 0}</div>
            <div class="stat-label">Completed</div>
          </div>
        </div>
      `;

      // Quick Tasks
      html += `<h3 style="margin-bottom: 15px;">Quick Tasks</h3>`;

      if (quickTasks.length === 0) {
        html += `<div class="empty-state"><i class="fas fa-tasks"></i><p>No tasks available</p></div>`;
      } else {
        quickTasks.slice(0, 3).forEach(task => {
          html += renderTaskCard(task);
        });
      }

      // Referral Box
      html += `
        <div class="referral-box">
          <div style="flex:1;">
            <div class="referral-link">https://t.me/${BOT_USERNAME}?start=${userData.id}</div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="copyReferralLink()">
            <i class="fas fa-copy"></i>
          </button>
        </div>
      `;

      el.innerHTML = html;
    }

    // ===== RENDER TASK CARD =====
    function renderTaskCard(task) {
      return `
        <div class="task-card">
          <div class="task-header">
            <span class="task-name">${task.name || 'Task'}</span>
            <span class="task-type">${task.type || 'General'}</span>
          </div>
          <div class="task-reward">
            <i class="fas fa-rupee-sign"></i>
            ${(task.reward || 0).toFixed(2)}
          </div>
          <div class="task-actions">
            <button class="btn btn-outline btn-sm" onclick="window.open('${task.link || '#'}', '_blank')">
              <i class="fas fa-external-link-alt"></i> Open
            </button>
            <button class="btn btn-success btn-sm" onclick="claimTask('${task.id}', ${task.reward || 0})">
              <i class="fas fa-check"></i> Claim
            </button>
          </div>
        </div>
      `;
    }

    // ===== CLAIM TASK =====
    async function claimTask(taskId, reward) {
      if (!currentUserId) {
        showToast('Please login first', 'error');
        return;
      }

      if (claimedTasks.has(taskId)) {
        showToast('Already claimed this task', 'warning');
        return;
      }

      const claimRef = db.collection('user_claims').doc(`${currentUserId}_${taskId}`);
      const userRef = db.collection('users').doc(currentUserId);

      try {
        await db.runTransaction(async (transaction) => {
          const claimDoc = await transaction.get(claimRef);
          if (claimDoc.exists) {
            throw new Error('already_claimed');
          }

          transaction.set(claimRef, {
            userId: currentUserId,
            taskId: taskId,
            claimedAt: firebase.firestore.FieldValue.serverTimestamp()
          });

          transaction.update(userRef, {
            coins: firebase.firestore.FieldValue.increment(reward),
            tasksCompleted: firebase.firestore.FieldValue.increment(1)
          });
        });

        claimedTasks.add(taskId);
        showToast(`✅ Claimed ₹${reward.toFixed(2)}!`, 'success');
        
        // Refresh dashboard if active
        if (document.querySelector('[data-tab="dashboard"]').classList.contains('active')) {
          renderDashboard();
        } else if (document.querySelector('[data-tab="tasks"]').classList.contains('active')) {
          renderTasks();
        }

      } catch (error) {
        if (error.message === 'already_claimed') {
          showToast('Already claimed', 'warning');
        } else {
          console.error('Claim error:', error);
          showToast('Error claiming task', 'error');
        }
      }
    }

    // ===== MONETAG AD TASK (Rewarded Video) =====
    async function claimAdReward() {
      if (!currentUserId) {
        showToast('Please login first', 'error');
        return;
      }

      try {
        // Show Monetag rewarded ad
        show_10730906('pop').then(async () => {
          // User watched ad till the end - reward 50 coins
          const userRef = db.collection('users').doc(currentUserId);
          await userRef.update({
            coins: firebase.firestore.FieldValue.increment(50)
          });
          
          showToast('💰 +₹50 from watching ad!', 'success');
          
          // Refresh current tab to update balance
          refreshCurrentTab();
          
        }).catch(e => {
          // User closed ad or error occurred
          console.log('Ad not completed or error:', e);
          showToast('Ad not completed. Try again!', 'warning');
        });
      } catch (error) {
        console.error('Ad claim error:', error);
        showToast('Error showing advertisement', 'error');
      }
    }

    // ===== RENDER TASKS =====
    async function renderTasks() {
      const el = document.getElementById('tab-tasks');
      
      await loadClaimedTasks();

      el.innerHTML = `
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="taskSearch" placeholder="Search tasks...">
        </div>

        <div id="tasksList">
          <div class="skeleton"></div>
        </div>
      `;

      const searchInput = document.getElementById('taskSearch');
      
      // Load tasks
      if (unsubscribeTasks) unsubscribeTasks();
      
      unsubscribeTasks = db.collection('tasks')
        .orderBy('createdAt', 'desc')
        .onSnapshot(snap => {
          allTasks = [];
          snap.forEach(doc => allTasks.push({ id: doc.id, ...doc.data() }));
          filterTasks();
        });

      searchInput.addEventListener('input', filterTasks);
    }

    function filterTasks() {
      const searchQuery = document.getElementById('taskSearch')?.value.toLowerCase() || '';
      
      let filtered = allTasks.filter(t => !claimedTasks.has(t.id));

      if (searchQuery) {
        filtered = filtered.filter(t => 
          t.name?.toLowerCase().includes(searchQuery) || 
          t.type?.toLowerCase().includes(searchQuery)
        );
      }

      const tasksList = document.getElementById('tasksList');
      if (!tasksList) return;

      if (filtered.length === 0 && claimedTasks.size === allTasks.length) {
        tasksList.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-check-circle" style="color: var(--success);"></i>
            <p>All tasks completed! 🎉</p>
          </div>
        `;
        return;
      }

      let html = '';
      filtered.forEach(task => {
        html += renderTaskCard(task);
      });

      // Add permanent Monetag ad task (unlimited)
      html += `
        <div class="task-card" style="border: 2px solid var(--warning);">
          <div class="task-header">
            <span class="task-name">📺 Watch Video Ad</span>
            <span class="task-type">Unlimited</span>
          </div>
          <div class="task-reward">
            <i class="fas fa-rupee-sign"></i>
            50.00
          </div>
          <div class="task-actions">
            <button class="btn btn-success" onclick="claimAdReward()">
              <i class="fas fa-play"></i> Watch & Earn
            </button>
          </div>
          <p style="font-size: 0.8rem; color: var(--gray); margin-top: 8px;">
            <i class="fas fa-info-circle"></i> Watch rewarded video to earn
          </p>
        </div>
      `;

      tasksList.innerHTML = html;
    }

    // ===== RENDER WITHDRAW =====
    async function renderWithdraw() {
      const el = document.getElementById('tab-withdraw');
      
      if (!userData) {
        el.innerHTML = '<div class="skeleton"></div>';
        return;
      }

      el.innerHTML = `
        <div class="glass-card">
          <h3 style="margin-bottom: 20px;">Withdraw Money</h3>
          
          <div class="input-group">
            <label>UPI ID</label>
            <input type="text" id="upiInput" class="input-field" placeholder="example@okhdfcbank">
          </div>

          <div class="input-group">
            <label>Amount (₹)</label>
            <input type="number" id="amountInput" class="input-field" placeholder="Min ₹20" min="20" step="1">
          </div>

          <div style="background: #f3f4f6; padding: 15px; border-radius: 20px; margin: 20px 0;">
            <p><i class="fas fa-info-circle"></i> Your balance: <strong>₹${(userData.coins || 0).toFixed(2)}</strong></p>
            <p style="font-size: 0.9rem;">Minimum withdrawal: ₹20</p>
          </div>

          <button class="btn btn-primary" onclick="submitWithdrawal()" style="width: 100%;">
            <i class="fas fa-paper-plane"></i> Request Withdrawal
          </button>
        </div>

        <h3 style="margin: 20px 0 10px;">Recent Withdrawals</h3>
        <div id="recentWithdrawals"></div>
      `;

      // Load withdrawals
      const withdrawalsRef = db.collection('withdrawals')
        .where('userId', '==', currentUserId)
        .orderBy('createdAt', 'desc')
        .limit(3);

      withdrawalsRef.onSnapshot(snap => {
        const listDiv = document.getElementById('recentWithdrawals');
        if (!listDiv) return;

        if (snap.empty) {
          listDiv.innerHTML = '<div class="empty-state"><i class="fas fa-history"></i><p>No withdrawals yet</p></div>';
          return;
        }

        let html = '';
        snap.forEach(doc => {
          const w = doc.data();
          const date = w.createdAt ? new Date(w.createdAt.toDate()).toLocaleDateString() : 'Just now';
          
          html += `
            <div class="withdrawal-item">
              <div>
                <strong>₹${w.amount.toFixed(2)}</strong>
                <p style="font-size: 0.8rem; color: var(--gray);">${date}</p>
              </div>
              <div>
                <span class="status-badge status-${w.status || 'pending'}">${w.status || 'pending'}</span>
              </div>
            </div>
          `;
        });

        listDiv.innerHTML = html;
      });
    }

    async function submitWithdrawal() {
      const upi = document.getElementById('upiInput').value.trim();
      const amount = parseFloat(document.getElementById('amountInput').value);

      if (!upi) {
        showToast('Please enter UPI ID', 'error');
        return;
      }

      if (!amount || amount < 20) {
        showToast('Minimum withdrawal is ₹20', 'error');
        return;
      }

      if (amount > (userData?.coins || 0)) {
        showToast('Insufficient balance', 'error');
        return;
      }

      try {
        await db.collection('withdrawals').add({
          userId: currentUserId,
          upi: upi,
          amount: amount,
          status: 'pending',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        showToast('✅ Withdrawal requested!', 'success');
        
        document.getElementById('upiInput').value = '';
        document.getElementById('amountInput').value = '';

      } catch (error) {
        console.error('Withdrawal error:', error);
        showToast('Error requesting withdrawal', 'error');
      }
    }

    // ===== RENDER PROFILE =====
    function renderProfile() {
      if (!userData) return;

      const el = document.getElementById('tab-profile');
      
      el.innerHTML = `
        <div class="glass-card" style="text-align: center;">
          <img class="avatar" style="width: 100px; height: 100px; margin: 0 auto 20px;" src="${userData.photoURL}" alt="avatar">
          
          <h2>${userData.name}</h2>
          <p style="color: var(--gray); margin: 5px 0;">ID: ${userData.id}</p>
          
          <div style="background: #f3f4f6; padding: 15px; border-radius: 30px; margin: 20px 0;">
            <p><i class="fas fa-user-plus"></i> Referred by: <strong>${userData.refferBy || 'None'}</strong></p>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <i class="fas fa-rupee-sign"></i>
              <div class="stat-value">₹${(userData.coins || 0).toFixed(2)}</div>
              <div class="stat-label">Balance</div>
            </div>
            <div class="stat-card">
              <i class="fas fa-users"></i>
              <div class="stat-value">${userData.reffer || 0}</div>
              <div class="stat-label">Referrals</div>
            </div>
            <div class="stat-card">
              <i class="fas fa-history"></i>
              <div class="stat-value">₹${(userData.totalWithdrawals || 0).toFixed(2)}</div>
              <div class="stat-label">Withdrawn</div>
            </div>
            <div class="stat-card">
              <i class="fas fa-check-circle"></i>
              <div class="stat-value">${userData.tasksCompleted || 0}</div>
              <div class="stat-label">Tasks</div>
            </div>
          </div>

          <div style="display: flex; gap: 10px;">
            <button class="btn btn-outline" onclick="renderProfile()" style="flex: 1;">
              <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <button class="btn btn-primary" onclick="copyReferralLink()" style="flex: 1;">
              <i class="fas fa-copy"></i> Copy Link
            </button>
          </div>
        </div>
      `;
    }

    // ===== COPY REFERRAL LINK =====
    function copyReferralLink() {
      if (!userData) return;
      
      const link = `https://t.me/${BOT_USERNAME}?start=${userData.id}`;
      navigator.clipboard.writeText(link);
      showToast('📋 Referral link copied!', 'success');
    }

    // ===== SWITCH TABS =====
    function switchTabs(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');

      document.querySelectorAll('.tab-content').forEach(el => {
        el.classList.remove('active');
      });
      document.getElementById(`tab-${tabId}`).classList.add('active');

      switch(tabId) {
        case 'dashboard':
          renderDashboard();
          break;
        case 'tasks':
          renderTasks();
          break;
        case 'withdraw':
          renderWithdraw();
          break;
        case 'profile':
          renderProfile();
          break;
      }
    }

    // ===== INIT =====
    window.addEventListener('load', async () => {
      initTelegram();
      
      if (!initFirebase()) {
        showToast('Firebase configuration error', 'error');
        return;
      }

      await createOrFetchUser();
      await loadClaimedTasks();

      // Tab click listeners
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const tab = e.currentTarget.dataset.tab;
          switchTabs(tab);
        });
      });

      // Start with dashboard
      switchTabs('dashboard');
    });

    // Cleanup
    window.addEventListener('beforeunload', () => {
      if (unsubscribeUser) unsubscribeUser();
      if (unsubscribeTasks) unsubscribeTasks();
    });
  </script>
</body>
</html>
