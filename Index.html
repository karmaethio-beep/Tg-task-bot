<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>G Task - Earn Crypto by Completing Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1a2a3a;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .logo i {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            color: #4a5568;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: 500;
            cursor: pointer;
        }

        .nav-link:hover {
            background: #f7fafc;
            color: #667eea;
        }

        .nav-link.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #4a5568;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
        }

        .btn-large {
            padding: 1rem 2rem;
            font-size: 1.1rem;
        }

        .btn-full {
            width: 100%;
            justify-content: center;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Hero Section */
        .hero {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 4rem 2rem;
        }

        .hero-content {
            max-width: 800px;
            margin-bottom: 4rem;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            color: white;
            margin-bottom: 2rem;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            color: white;
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero-description {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-stats {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 24px;
            padding: 1.8rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }

        .card:hover {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #667eea;
        }

        .stat-card .stat-label {
            font-size: 0.85rem;
            color: #718096;
            margin-top: 0.25rem;
        }

        .stat-card .stat-icon {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 2rem;
            opacity: 0.1;
        }

        /* Features */
        .features {
            padding: 4rem 2rem;
            background: white;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .section-subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 3rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            background: #f8fafc;
            padding: 2rem;
            border-radius: 24px;
            text-align: center;
            transition: all 0.3s;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Task Grid */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }

        .task-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .task-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .task-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #e9ecef;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .task-reward {
            font-size: 2rem;
            font-weight: 800;
            color: #28a745;
            margin-bottom: 0.5rem;
        }

        .task-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .task-desc {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .task-data {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 16px;
            margin: 1rem 0;
            font-size: 0.85rem;
        }

        .data-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .data-label {
            font-weight: 600;
            min-width: 80px;
        }

        .data-value {
            font-family: monospace;
            background: white;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            flex: 1;
            word-break: break-all;
        }

        .copy-btn {
            background: #e9ecef;
            border: none;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #dee2e6;
        }

        /* Auth Container */
        .auth-page {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            max-width: 500px;
            width: 100%;
        }

        .auth-form {
            background: white;
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeInUp 0.5s ease;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .auth-header h2 {
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .auth-header p {
            color: #718096;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #2d3748;
        }

        .form-input {
            width: 100%;
            padding: 0.85rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group small {
            display: block;
            margin-top: 0.3rem;
            color: #718096;
            font-size: 0.75rem;
        }

        /* Alert */
        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Telegram Warning */
        .telegram-warning {
            background: linear-gradient(135deg, #e3f2fd, #bbdef5);
            border: 2px solid #0088cc;
            border-radius: 16px;
            padding: 1.2rem;
            margin: 1rem 0;
            text-align: center;
        }

        .telegram-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #0088cc;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .telegram-link:hover {
            background: #006699;
            transform: scale(1.02);
        }

        .bot-name {
            background: #0088cc;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-weight: 600;
        }

        /* Code Input */
        .code-input-group {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .code-input {
            flex: 1;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 8px;
            font-family: monospace;
        }

        /* Table */
        .table-container {
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th, .table td {
            padding: 0.8rem;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        .table th {
            background: #f8fafc;
            font-weight: 600;
            color: #4a5568;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-paid {
            background: #d4edda;
            color: #155724;
        }

        .reward-cell {
            color: #28a745;
            font-weight: 600;
        }

        /* Leaderboard */
        .leaderboard-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 16px;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }

        .leaderboard-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .leaderboard-rank {
            font-size: 1.2rem;
            font-weight: 700;
            min-width: 50px;
        }

        .leaderboard-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }

        .leaderboard-stats {
            display: flex;
            gap: 1rem;
        }

        /* Profile */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .profile-stats .stat-item {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
        }

        .profile-stats .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
        }

        /* Withdraw */
        .withdraw-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
        }

        .balance-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .balance-amount {
            font-size: 2.5rem;
            font-weight: 800;
        }

        /* Admin Panel */
        .admin-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
        }

        .admin-badge {
            background: #dc3545;
            color: white;
        }

        .pending-item {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 0.75rem;
        }

        .pending-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .pending-report {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: white;
            border-radius: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid #e9ecef;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #999;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-buttons {
            padding: 1.5rem;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 1rem;
        }

        .task-type-selector {
            display: flex;
            gap: 1rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e9ecef;
        }

        .type-btn {
            flex: 1;
            padding: 0.75rem;
            background: #e9ecef;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .type-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: white;
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }

        .toast-success {
            background: #28a745;
        }

        .toast-error {
            background: #dc3545;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        .empty-state {
            text-align: center;
            color: #718096;
            padding: 2rem;
        }

        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            color: #718096;
        }

        .auth-switch a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .nav-links.show {
                display: flex;
            }
            
            .mobile-menu-btn {
                display: block;
            }
            
            .hero-title {
                font-size: 2rem;
            }
            
            .container {
                padding: 0 1rem;
            }
            
            .stats-grid, .task-grid, .profile-grid, .withdraw-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                width: 95%;
            }
        }

        footer {
            background: #1a2a3a;
            color: white;
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-tasks"></i>
                <span>G Task</span>
            </div>
            <div class="nav-links" id="navLinks">
                <a class="nav-link" onclick="showPage('home')">Home</a>
                <a class="nav-link" onclick="showPage('dashboard')">Dashboard</a>
                <a class="nav-link" onclick="showPage('tasks')">Tasks</a>
                <a class="nav-link" onclick="showPage('withdraw')">Withdraw</a>
                <a class="nav-link" onclick="showPage('leaderboard')">Leaderboard</a>
                <a class="nav-link" onclick="showPage('profile')">Profile</a>
            </div>
            <div class="user-info" id="userInfo"></div>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <div id="mainContainer" class="container"></div>

    <footer>
        <div class="footer-content">
            <p><i class="fas fa-tasks"></i> G Task - Earn Crypto by Completing Tasks</p>
            <p>© 2024 G Task. All rights reserved.</p>
            <p>🤖 Bot: @G_task_bot | Instant USDT Payouts</p>
        </div>
    </footer>

                                <h4><i class="fas fa-clock"></i> Pending Reports (${reports.filter(r => r.status === 'pending').length})</h4>
                                <div id="pendingReportsList"></div>
                            </div>
                            <div style="margin-top: 1.5rem;">
                                <h4><i class="fas fa-money-bill-wave"></i> Pending Withdrawals (${withdrawals.filter(w => w.status === 'pending').length})</h4>
                                <div id="pendingWithdrawalsList"></div>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            
            if (isAdmin) {
                renderPendingReports();
                renderPendingWithdrawals();
            }
        }

        function renderPendingReports() {
            const pendingReports = reports.filter(r => r.status === 'pending');
            const container = document.getElementById('pendingReportsList');
            if (pendingReports.length === 0) {
                container.innerHTML = '<div class="empty-state">No pending reports</div>';
                return;
            }
            const userMap = {};
            users.forEach(u => userMap[u.id] = u);
            container.innerHTML = pendingReports.map(r => `
                <div class="pending-item">
                    <div><strong>${escapeHtml(userMap[r.userId]?.username || 'Unknown')}</strong> completed "${escapeHtml(r.taskTitle)}"</div>
                    <div class="pending-report"><i class="fas fa-comment"></i> ${escapeHtml(r.report.substring(0, 100))}${r.report.length > 100 ? '...' : ''}</div>
                    <div class="pending-actions">
                        <button class="btn btn-success btn-sm" onclick="approveReport(${r.id})"><i class="fas fa-check"></i> Approve (+$${r.reward})</button>
                        <button class="btn btn-danger btn-sm" onclick="rejectReport(${r.id})"><i class="fas fa-times"></i> Reject</button>
                    </div>
                </div>
            `).join('');
        }

        function renderPendingWithdrawals() {
            const pendingWithdrawals = withdrawals.filter(w => w.status === 'pending');
            const container = document.getElementById('pendingWithdrawalsList');
            if (pendingWithdrawals.length === 0) {
                container.innerHTML = '<div class="empty-state">No pending withdrawals</div>';
                return;
            }
            const userMap = {};
            users.forEach(u => userMap[u.id] = u);
            container.innerHTML = pendingWithdrawals.map(w => `
                <div class="pending-item">
                    <div><strong>${escapeHtml(userMap[w.userId]?.username || 'Unknown')}</strong> requested <strong>$${w.amount}</strong></div>
                    <div><i class="fas fa-qrcode"></i> Wallet: ${escapeHtml(w.walletAddress.substring(0, 30))}...</div>
                    <div class="pending-actions">
                        <button class="btn btn-success btn-sm" onclick="approveWithdrawal(${w.id})"><i class="fas fa-check"></i> Approve</button>
                        <button class="btn btn-danger btn-sm" onclick="rejectWithdrawal(${w.id})"><i class="fas fa-times"></i> Reject</button>
                    </div>
                </div>
            `).join('');
        }

        // ==================== MODAL FUNCTIONS ====================
        let currentTask = null;
        
        function openTaskModal(taskId) {
            currentTask = tasks.find(t => t.id === taskId);
            const modalHtml = `
                <div id="taskModal" class="modal" style="display: flex;">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2><i class="fas fa-clipboard-list"></i> ${escapeHtml(currentTask.title)}</h2>
                            <button class="modal-close" onclick="closeModal('taskModal')">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div><strong><i class="fas fa-tag"></i> Reward:</strong> <span style="color: #28a745; font-weight: 700;">$${currentTask.reward}</span></div>
                            <div style="margin-top: 1rem;"><strong><i class="fas fa-info-circle"></i> Instructions:</strong><br>${escapeHtml(currentTask.instructions)}</div>
                            <div style="margin-top: 1rem;"><strong><i class="fas fa-database"></i> Provided Information:</strong></div>
                            ${currentTask.type === 'gmail' ? `
                                <div class="data-row"><span class="data-label">Email:</span><span class="data-value">${escapeHtml(currentTask.data.email)}</span><button class="copy-btn" onclick="copyText('${escapeHtml(currentTask.data.email)}')">Copy</button></div>
                                <div class="data-row"><span class="data-label">Password:</span><span class="data-value">${escapeHtml(currentTask.data.password)}</span><button class="copy-btn" onclick="copyText('${escapeHtml(currentTask.data.password)}')">Copy</button></div>
                            ` : `
                                <div class="data-row"><span class="data-label">Login:</span><span class="data-value">${escapeHtml(currentTask.data.login)}</span><button class="copy-btn" onclick="copyText('${escapeHtml(currentTask.data.login)}')">Copy</button></div>
                                <div class="data-row"><span class="data-label">Password:</span><span class="data-value">${escapeHtml(currentTask.data.password)}</span><button class="copy-btn" onclick="copyText('${escapeHtml(currentTask.data.password)}')">Copy</button></div>
                                <div class="data-row"><span class="data-label">Email:</span><span class="data-value">${escapeHtml(currentTask.data.email)}</span><button class="copy-btn" onclick="copyText('${escapeHtml(currentTask.data.email)}')">Copy</button></div>
                            `}
                            <div class="form-group" style="margin-top: 1rem;">
                                <label><i class="fas fa-edit"></i> Task Completion Proof / Report</label>
                                <textarea id="taskReport" rows="4" class="form-input" placeholder="Describe how you completed the task or provide proof..."></textarea>
                            </div>
                        </div>
                        <div class="modal-buttons">
                            <button class="btn btn-primary" onclick="submitTaskReport()"><i class="fas fa-paper-plane"></i> Submit Report</button>
                            <button class="btn btn-outline" onclick="closeModal('taskModal')">Cancel</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        function submitTaskReport() {
            const report = document.getElementById('taskReport')?.value;
            if (!report) {
                alert('Please provide a report');
                return;
            }
            
            reports.push({
                id: Date.now(),
                userId: currentUser.id,
                taskId: currentTask.id,
                taskTitle: currentTask.title,
                reward: currentTask.reward,
                report: report,
                status: 'pending',
                date: new Date().toISOString()
            });
            saveReports();
            closeModal('taskModal');
            showToast('✅ Report submitted! Admin will review soon.', 'success');
        }

        function requestWithdraw() {
            const amount = parseFloat(document.getElementById('withdrawAmount')?.value);
            const walletAddress = document.getElementById('walletAddress')?.value;
            const method = document.getElementById('paymentMethod')?.value;
            
            if (!walletAddress) { showToast('Please enter wallet address', 'error'); return; }
            if (isNaN(amount) || amount < 0.20) { showToast('Minimum withdrawal is $0.20', 'error'); return; }
            if (amount > currentUser.balance) { showToast(`Insufficient balance. You have $${currentUser.balance}`, 'error'); return; }
            
            withdrawals.push({
                id: Date.now(),
                userId: currentUser.id,
                amount: amount,
                method: method,
                walletAddress: walletAddress,
                status: 'pending',
                date: new Date().toISOString()
            });
            saveWithdrawals();
            
            currentUser.balance -= amount;
            currentUser.totalWithdrawn += amount;
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) users[userIndex] = currentUser;
            saveUsers();
            localStorage.setItem('gtask_user', JSON.stringify(currentUser));
            
            showToast('✅ Withdrawal request submitted!', 'success');
            renderWithdraw();
            checkAuthStatus();
        }

        // ==================== ADMIN FUNCTIONS ====================
        function openAdminModal() {
            const modalHtml = `
                <div id="adminModal" class="modal" style="display: flex;">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2><i class="fas fa-plus-circle"></i> Add New Task</h2>
                            <button class="modal-close" onclick="closeModal('adminModal')">&times;</button>
                        </div>
                        <div class="task-type-selector">
                            <button class="type-btn active" onclick="setTaskType('gmail')"><i class="fas fa-envelope"></i> Gmail Account</button>
                            <button class="type-btn" onclick="setTaskType('instagram')"><i class="fab fa-instagram"></i> Instagram Account</button>
                        </div>
                        <div id="adminTaskForm" style="padding: 1.5rem;"></div>
                        <div class="modal-buttons">
                            <button class="btn btn-primary" onclick="addTask()"><i class="fas fa-save"></i> Create Task</button>
                            <button class="btn btn-outline" onclick="closeModal('adminModal')">Cancel</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            setTaskType('gmail');
        }

        function setTaskType(type) {
            currentTaskType = type;
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const formContainer = document.getElementById('adminTaskForm');
            if (type === 'gmail') {
                formContainer.innerHTML = `
                    <div class="form-group"><label>Task Title</label><input type="text" id="taskTitle" class="form-input" value="Gmail Account Verification"></div>
                    <div class="form-group"><label>Reward (USD)</label><input type="number" id="taskReward" step="0.01" class="form-input" value="0.17"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="gmailEmail" class="form-input"></div>
                    <div class="form-group"><label>Password</label><input type="text" id="gmailPassword" class="form-input"></div>
                    <div class="form-group"><label>First Name</label><input type="text" id="gmailFirstName" class="form-input"></div>
                    <div class="form-group"><label>Instructions</label><textarea id="taskInstructions" rows="3" class="form-input"></textarea></div>
                `;
            } else {
                formContainer.innerHTML = `
                    <div class="form-group"><label>Task Title</label><input type="text" id="taskTitle" class="form-input" value="Create Instagram Account"></div>
                    <div class="form-group"><label>Reward (USD)</label><input type="number" id="taskReward" step="0.01" class="form-input" value="0.02"></div>
                    <div class="form-group"><label>Login/Username</label><input type="text" id="instLogin" class="form-input"></div>
                    <div class="form-group"><label>Password</label><input type="text" id="instPassword" class="form-input"></div>
                    <div class="form-group"><label>Name</label><input type="text" id="instName" class="form-input"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="instEmail" class="form-input"></div>
                    <div class="form-group"><label>Instructions</label><textarea id="taskInstructions" rows="3" class="form-input"></textarea></div>
                `;
            }
        }

        function addTask() {
            const title = document.getElementById('taskTitle').value;
            const reward = parseFloat(document.getElementById('taskReward').value);
            const instructions = document.getElementById('taskInstructions').value;
            
            let data = {};
            if (currentTaskType === 'gmail') {
                data = {
                    email: document.getElementById('gmailEmail').value,
                    password: document.getElementById('gmailPassword').value,
                    firstName: document.getElementById('gmailFirstName').value
                };
            } else {
                data = {
                    login: document.getElementById('instLogin').value,
                    password: document.getElementById('instPassword').value,
                    firstName: document.getElementById('instName').value,
                    email: document.getElementById('instEmail').value
                };
            }
            
            tasks.push({
                id: Date.now(),
                type: currentTaskType,
                title: title,
                reward: reward,
                data: data,
                instructions: instructions
            });
            saveTasks();
            closeModal('adminModal');
            showToast('✅ Task added successfully!', 'success');
            if (currentPage === 'tasks') renderTasks();
        }

        function approveReport(reportId) {
            const report = reports.find(r => r.id === reportId);
            if (report) {
                report.status = 'approved';
                const user = users.find(u => u.id === report.userId);
                if (user) {
                    user.balance += report.reward;
                    user.totalEarned += report.reward;
                    user.approvedReports += 1;
                    saveUsers();
                    if (currentUser?.id === user.id) {
                        currentUser = user;
                        localStorage.setItem('gtask_user', JSON.stringify(currentUser));
                        checkAuthStatus();
                    }
                }
                saveReports();
                showToast(`✅ Report approved! +$${report.reward} added.`, 'success');
                renderProfile();
            }
        }

        function rejectReport(reportId) {
            const report = reports.find(r => r.id === reportId);
            if (report) {
                report.status = 'rejected';
                saveReports();
                showToast('❌ Report rejected.', 'success');
                renderProfile();
            }
        }

        function approveWithdrawal(withdrawalId) {
            const withdrawal = withdrawals.find(w => w.id === withdrawalId);
            if (withdrawal) {
                withdrawal.status = 'paid';
                saveWithdrawals();
                showToast('✅ Withdrawal approved!', 'success');
                renderProfile();
            }
        }

        function rejectWithdrawal(withdrawalId) {
            const withdrawal = withdrawals.find(w => w.id === withdrawalId);
            if (withdrawal) {
                withdrawal.status = 'rejected';
                const user = users.find(u => u.id === withdrawal.userId);
                if (user) {
                    user.balance += withdrawal.amount;
                    saveUsers();
                    if (currentUser?.id === user.id) {
                        currentUser = user;
                        localStorage.setItem('gtask_user', JSON.stringify(currentUser));
                        checkAuthStatus();
                    }
                }
                saveWithdrawals();
                showToast('❌ Withdrawal rejected. Amount refunded.', 'success');
                renderProfile();
            }
        }

        // ==================== AUTHENTICATION MODAL ====================
        let tempSignupData = null;
        let signupStep = 1;
        
        function showLoginModal() {
            const modalHtml = `
                <div id="authModal" class="modal" style="display: flex;">
                    <div class="modal-content" style="max-width: 500px;">
                        <div class="modal-header">
                            <h2><i class="fas fa-user"></i> Welcome to G Task</h2>
                            <button class="modal-close" onclick="closeModal('authModal')">&times;</button>
                        </div>
                        <div id="authContent"></div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            showLoginForm();
        }

        function showLoginForm() {
            const authContent = document.getElementById('authContent');
            authContent.innerHTML = `
                <div class="auth-header">
                    <div class="auth-icon"><i class="fas fa-lock"></i></div>
                    <h2>Welcome Back</h2>
                    <p>Sign in to your account</p>
                </div>
                <div id="loginError" class="alert alert-error" style="display: none;"></div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="loginUsername" class="form-input" placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Password</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password">
                </div>
                <button class="btn btn-primary btn-full" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Sign In</button>
                <p class="auth-switch">Don't have an account? <a onclick="showSignupForm()">Create one</a></p>
            `;
        }

        function showSignupForm() {
            signupStep = 1;
            const authContent = document.getElementById('authContent');
            authContent.innerHTML = `
                <div class="auth-header">
                    <div class="auth-icon"><i class="fas fa-user-plus"></i></div>
                    <h2>Create Account</h2>
                    <p>Join G Task and start earning</p>
                </div>
                <div id="signupError" class="alert alert-error" style="display: none;"></div>
                <div id="signupStep1">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Username</label>
                        <input type="text" id="signupUsername" class="form-input" placeholder="Choose a username">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-key"></i> Password</label>
                        <input type="password" id="signupPassword" class="form-input" placeholder="Choose a password (min 4 chars)">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                        <input type="password" id="signupConfirm" class="form-input" placeholder="Confirm password">
                    </div>
                    <div class="telegram-warning">
                        <i class="fab fa-telegram"></i> <strong>IMPORTANT!</strong><br>
                        You MUST start the bot first to receive your verification code.<br>
                        <a href="https://t.me/G_task_bot" target="_blank" class="telegram-link">
                            <i class="fab fa-telegram"></i> Start @G_task_bot
                        </a>
                    </div>
                    <button class="btn btn-primary btn-full" onclick="sendVerificationCode()">
                        <i class="fab fa-telegram"></i> Get Verification Code
                    </button>
                    <p class="auth-switch">Already have an account? <a onclick="showLoginForm()">Sign In</a></p>
                </div>
            `;
        }

        function sendVerificationCode() {
            const username = document.getElementById('signupUsername')?.value;
            const password = document.getElementById('signupPassword')?.value;
            const confirm = document.getElementById('signupConfirm')?.value;
            
            if (!username || !password || !confirm) {
                showAuthError('Please fill all fields');
                return;
            }
            if (password !== confirm) {
                showAuthError('Passwords do not match');
                return;
            }
            if (password.length < 4) {
                showAuthError('Password must be at least 4 characters');
                return;
            }
            
            // Generate random 6-digit code
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            tempSignupData = { username, password, code };
            
            // Show code in alert (simulating Telegram bot)
            alert(`📱 VERIFICATION CODE\n\n${code}\n\nThis is the code you would receive from @G_task_bot on Telegram.\n\nIn production, this would be sent to your Telegram.\n\nCopy this code and paste it in the next step.`);
            
            // Show code input step
            const authContent = document.getElementById('authContent');
            authContent.innerHTML = `
                <div class="auth-header">
                    <div class="auth-icon"><i class="fas fa-qrcode"></i></div>
                    <h2>Verify Your Account</h2>
                    <p>Enter the code sent to @G_task_bot</p>
                </div>
                <div id="signupError" class="alert alert-error" style="display: none;"></div>
                <div class="form-group">
                    <label><i class="fas fa-code"></i> Verification Code</label>
                    <div class="code-input-group">
                        <input type="text" id="verificationCode" maxlength="6" class="form-input code-input" placeholder="000000">
                    </div>
                    <small>Code sent to <strong>@G_task_bot</strong> on Telegram</small>
                </div>
                <button class="btn btn-success btn-full" onclick="completeSignup()">
                    <i class="fas fa-check-circle"></i> Create Account
                </button>
                <button class="btn btn-outline btn-full" onclick="showSignupForm()" style="margin-top: 1rem;">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            `;
        }

        function completeSignup() {
            const code = document.getElementById('verificationCode')?.value;
            if (!code || code !== tempSignupData.code) {
                showAuthError('Invalid verification code. Please try again.');
                return;
            }
            
            // Check if username exists
            if (users.find(u => u.username === tempSignupData.username)) {
                showAuthError('Username already exists');
                return;
            }
            
            const newUser = {
                id: users.length + 1,
                username: tempSignupData.username,
                password: tempSignupData.password,
                isAdmin: tempSignupData.username === ADMIN_USERNAME,
                balance: 0,
                totalEarned: 0,
                totalWithdrawn: 0,
                approvedReports: 0,
                joinedDate: new Date().toISOString(),
                telegramId: null
            };
            
            users.push(newUser);
            saveUsers();
            
            currentUser = newUser;
            localStorage.setItem('gtask_token', 'dummy_token_' + Date.now());
            localStorage.setItem('gtask_user', JSON.stringify(currentUser));
            
            closeModal('authModal');
            showToast('🎉 Account created successfully! Welcome to G Task!', 'success');
            checkAuthStatus();
            showPage('dashboard');
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername')?.value;
            const password = document.getElementById('loginPassword')?.value;
            
            const user = users.find(u => u.username === username && u.password === password);
            if (!user) {
                showAuthError('Invalid username or password');
                return;
            }
            
            currentUser = user;
            localStorage.setItem('gtask_token', 'dummy_token_' + Date.now());
            localStorage.setItem('gtask_user', JSON.stringify(currentUser));
            
            closeModal('authModal');
            showToast('✅ Login successful! Welcome back!', 'success');
            checkAuthStatus();
            showPage('dashboard');
        }

        function showAuthError(message) {
            const errorDiv = document.getElementById('signupError') || document.getElementById('loginError');
            if (errorDiv) {
                errorDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 3000);
            } else {
                alert(message);
            }
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) modal.remove();
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            showToast('Copied to clipboard!', 'success');
        }

        // ==================== GLOBAL FUNCTIONS ====================
        window.showPage = showPage;
        window.showLoginModal = showLoginModal;
        window.logout = logout;
        window.copyText = copyText;
        window.openTaskModal = openTaskModal;
        window.submitTaskReport = submitTaskReport;
        window.requestWithdraw = requestWithdraw;
        window.approveReport = approveReport;
        window.rejectReport = rejectReport;
        window.approveWithdrawal = approveWithdrawal;
        window.rejectWithdrawal = rejectWithdrawal;
        window.openAdminModal = openAdminModal;
        window.setTaskType = setTaskType;
        window.addTask = addTask;
        window.closeModal = closeModal;
        window.handleLogin = handleLogin;
        window.showLoginForm = showLoginForm;
        window.showSignupForm = showSignupForm;
        window.sendVerificationCode = sendVerificationCode;
        window.completeSignup = completeSignup;
        window.toggleMobileMenu = toggleMobileMenu;

        let currentTaskType = 'gmail';

        // Initialize
        initData();
        checkAuthStatus();
        showPage('home');
    </script>
</body>
</html>
